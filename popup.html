<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-color: #050505;
            --glass-bg: rgba(20, 20, 20, 0.45);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #4f46e5;
            --c-youtube: #FF0000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            width: 380px; 
            padding: 1.5rem;
        }

        .brand-logo {
            font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(90deg, #ffffff, #888888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem; display: block; text-align: center;
        }
        .brand-logo span { color: var(--accent); -webkit-text-fill-color: var(--accent); }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 10px 30px rgba(0, 0, 0, 0.8);
            border-color: rgba(255,255,255,0.4);
        }

        .platform-title { margin-bottom: 1.5rem; font-weight: 500; font-size: 1.2rem; display: flex; align-items: center; gap: 8px;}
        .platform-title svg { width: 24px; height: 24px; color: var(--c-youtube); }

        .input-group, .advanced-settings { margin-bottom: 1.2rem; }

        .input-label { 
            display: block; color: var(--text-main); margin-bottom: 0.5rem; 
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
        }

        input.calc-input, select.geo-select {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            padding: 0.8rem; border-radius: 12px; color: white; font-size: 1rem;
            outline: none; transition: border-color 0.2s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            appearance: none;
        }
        
        input.calc-input:focus, select.geo-select:focus { 
            border-color: var(--accent); 
        }

        .result-group { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px dashed rgba(255,255,255,0.1); }
        .result-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 0.5rem; display: block;}
        
        .split-flap { font-size: 2.2rem; font-weight: 700; font-family: monospace; color: var(--c-youtube); }
        .rolling { animation: rollNumber 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes rollNumber {
            0% { opacity: 0; transform: translateY(-10px) rotateX(-90deg); filter: blur(4px); }
            100% { opacity: 1; transform: translateY(0) rotateX(0deg); filter: blur(0); }
        }

        .flex-row { display: flex; gap: 1rem; }
        .flex-row > div { flex: 1; }
    </style>
</head>
<body>
    <div class="brand-logo">Crecaly</div>

    <div class="glass-card">
        <h2 class="platform-title">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            YouTube
        </h2>

        <div class="input-group">
            <label class="input-label">Monthly Views</label>
            <input type="number" id="views-input" class="calc-input" value="100000" placeholder="0">
        </div>

        <div class="flex-row">
            <div class="advanced-settings">
                <label class="input-label">Content Niche</label>
                <select id="niche-select" class="geo-select">
                    <option value="default">General</option>
                    <option value="finance">Finance / Crypto</option>
                    <option value="tech">Tech / Business</option>
                    <option value="education">Education</option>
                    <option value="lifestyle">Lifestyle / Vlog</option>
                    <option value="gaming">Gaming</option>
                </select>
            </div>
            
            <div class="advanced-settings">
                <label class="input-label">Audience Geo</label>
                <select id="geo-select" class="geo-select">
                    <option value="1.0">Tier 1 (US, UK)</option>
                    <option value="0.6">Tier 2 (DE, FR)</option>
                    <option value="0.25">Tier 3 (IN, BR)</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">Tax Deduction (%)</label>
            <input type="number" id="tax-input" class="calc-input" value="0" placeholder="0">
        </div>
        
        <div class="result-group">
            <label class="result-label">In Your Pocket</label>
            <div class="split-flap" id="result-container">
                <span id="result-val">$0.00</span>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
